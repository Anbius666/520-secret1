<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>520 秘密</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container { text-align: center; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { color: #333; margin-bottom: 30px; font-size: 2rem; }
        input { padding: 15px 30px; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 10px; outline: none; }
        input:focus { border-color: #667eea; box-shadow: 0 0 15px rgba(102, 126, 234, 0.5); }
        .photo-container { display: none; }
        .photo-container.show { display: block; animation: fadeIn 1s ease; }
        .photo-container img { max-width: 100%; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .hint { color: #999; font-size: 0.9rem; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container" id="inputSection">
        <h1>💝 输入密码进入</h1>
        <input type="text" id="password" placeholder="请输入..." autocomplete="off">
        <p class="hint">提示：数字</p>
    </div>
    <div class="photo-container" id="photoSection">
        <img src="表情包.jpg" alt="照片">
    </div>
    <script>
        const input = document.getElementById('password');
        const inputSection = document.getElementById('inputSection');
        const photoSection = document.getElementById('photoSection');
        input.addEventListener('input', function() {
            if (this.value === '520') {
                inputSection.style.display = 'none';
                photoSection.classList.add('show');
            }
        });
    </script>
</body>
</html>
